name: CI

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        continue-on-error: true
        run: pnpm audit --audit-level=high

      - name: Secret scan
        run: |
          cat > /tmp/secret-patterns.txt <<PATTERNS
          PRIVATE.KEY
          sk_live_
          sk_test_
          aws_secret
          PATTERNS
          FOUND=0
          while IFS= read -r pattern; do
            pattern=$(echo "$pattern" | xargs)
            [ -z "$pattern" ] && continue
            if git grep -lI "$pattern" -- ':!*.md' ':!.github/workflows/*' ':!node_modules' 2>/dev/null; then
              echo "FAIL: potential secret pattern '$pattern' found"
              FOUND=1
            fi
          done < /tmp/secret-patterns.txt
          if [ "$FOUND" -eq 1 ]; then exit 1; fi
          echo "No hardcoded secrets detected"

      - name: Run tests
        run: pnpm test

      - name: Build project
        run: pnpm build
